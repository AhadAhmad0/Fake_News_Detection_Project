<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            padding: 32px;
        }
        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #111827;
            text-align: center;
        }
        p.subtitle {
            text-align: center;
            color: #4b5563;
            margin-bottom: 24px;
        }
        textarea {
            width: 100%;
            min-height: 220px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 14px;
            font-size: 15px;
            resize: vertical;
            outline: none;
        }
        textarea:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
        }
        button {
            width: 100%;
            margin-top: 16px;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: #4f46e5;
            cursor: pointer;
        }
        button:hover { background: #4338ca; }
        .result {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 12px;
            font-weight: bold;
            text-align: center;
        }
        .real {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }
        .fake {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        .warning {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fcd34d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fake News Detector</h1>
        <p class="subtitle">Paste a news article or paragraph to check whether it is fake or real.</p>

        <form method="POST">
            <textarea name="news" placeholder="Enter the news text here...">{{ news_input }}</textarea>
            <button type="submit">Check News</button>
        </form>

        {% if prediction_text %}
            <div class="result {{ prediction_class }}">
                {{ prediction_text }}
            </div>
        {% endif %}
    </div>
</body>
</html>
